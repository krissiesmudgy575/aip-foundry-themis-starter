<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" rx="28" fill="#0E1720"/>
  <rect x="36" y="36" width="1128" height="603" rx="24" fill="url(#bg)"/>
  <text x="64" y="100" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="38" font-weight="700">AIP Foundry Intake Triage Starter</text>
  <text x="64" y="136" fill="#9FD1D3" font-family="Arial, sans-serif" font-size="18">From local deterministic contract tests to app-ready integration</text>

  <rect x="64" y="196" width="240" height="174" rx="18" fill="#102838" stroke="#58B6B1"/>
  <text x="88" y="236" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">1. Request shaping</text>
  <text x="88" y="274" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">buildAgentInput</text>
  <text x="88" y="302" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">toFoundryRequest</text>
  <text x="88" y="330" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">caseId, queue,</text>
  <text x="88" y="356" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">useCase metadata</text>

  <rect x="328" y="196" width="240" height="174" rx="18" fill="#1D243A" stroke="#F3C567"/>
  <text x="352" y="236" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">2. Contract logic</text>
  <text x="352" y="274" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">normalizeAgentResult</text>
  <text x="352" y="302" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">priority, action, queue</text>
  <text x="352" y="330" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">telemetry capture</text>
  <text x="352" y="356" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">fallback handling</text>

  <rect x="592" y="196" width="240" height="174" rx="18" fill="#112E2A" stroke="#8BD08B"/>
  <text x="616" y="236" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">3. App consumption</text>
  <text x="616" y="274" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">triageAppViewModel</text>
  <text x="616" y="302" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">OSDK-style React demo</text>
  <text x="616" y="330" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">stable UI contract</text>
  <text x="616" y="356" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">reviewable envelope</text>

  <rect x="856" y="196" width="240" height="174" rx="18" fill="#362315" stroke="#F38E63"/>
  <text x="880" y="236" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">4. Platform handoff</text>
  <text x="880" y="274" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">evalHandoffBuilder</text>
  <text x="880" y="302" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">later platform evals</text>
  <text x="880" y="330" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">proof bundle export</text>
  <text x="880" y="356" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="16">shareable demo path</text>

  <path d="M304 284H328" stroke="#9FD1D3" stroke-width="6" stroke-linecap="round"/>
  <path d="M568 284H592" stroke="#F3C567" stroke-width="6" stroke-linecap="round"/>
  <path d="M832 284H856" stroke="#8BD08B" stroke-width="6" stroke-linecap="round"/>

  <rect x="64" y="418" width="1072" height="176" rx="18" fill="#0B141B" stroke="#243948"/>
  <text x="92" y="458" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Why this matters to developers integrating</text>
  <text x="92" y="486" fill="#F4E7CC" font-family="Arial, sans-serif" font-size="22" font-weight="700">Foundry-oriented workflows</text>
  <text x="92" y="524" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="18">• From agent or function idea to safe app integration</text>
  <text x="92" y="556" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="18">• Local deterministic contract checks before later platform evals</text>
  <text x="92" y="588" fill="#D6E0D8" font-family="Arial, sans-serif" font-size="18">• Runnable React demo with an OSDK-like seam developers can adapt</text>

  <defs>
    <linearGradient id="bg" x1="36" y1="36" x2="1164" y2="639" gradientUnits="userSpaceOnUse">
      <stop stop-color="#122230"/>
      <stop offset="1" stop-color="#0D141B"/>
    </linearGradient>
  </defs>
</svg>
